server:
  port: 8081

spring:
  application:
    name: product-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ecommerce}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: ${KAFKA_SERVER:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    properties:
      spring.json.add.type.headers: false
    jackson:
      serialization:
        write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:15MB}
      max-request-size: ${MAX_REQUEST_SIZE:20MB}

app:
  kafka:
    enabled: ${KAFKA_ENABLED:false}
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-key-must-be-at-least-32-chars}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  admin-frontend-url: ${ADMIN_FRONTEND_URL:http://localhost:3001}
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://localhost:3001}
  seed-data: ${SEED_DATA:false}
  seed-data-reset-existing: ${SEED_DATA_RESET_EXISTING:false}
  seed-product-review-ratings: ${SEED_PRODUCT_REVIEW_RATINGS:false}
  seed-product-review-ratings-reset-existing: ${SEED_PRODUCT_REVIEW_RATINGS:false}
  seed-product-review-ratings-min-per-product: ${SEED_PRODUCT_REVIEW_RATINGS_MIN_PER_PRODUCT:18}
  seed-product-review-ratings-max-per-product: ${SEED_PRODUCT_REVIEW_RATINGS_MAX_PER_PRODUCT:36}
  mail:
    resend:
      api-key: ${RESEND_API_KEY:}
      from-email: ${RESEND_FROM_EMAIL:}
      reply-to: ${RESEND_REPLY_TO:}
  iyzico:
    api-key: ${IYZICO_API_KEY:}
    secret-key: ${IYZICO_SECRET_KEY:}
    base-url: ${IYZICO_BASE_URL:https://sandbox-api.iyzipay.com}
  upload:
    provider: ${UPLOAD_PROVIDER:auto}
    cloudinary:
      cloud-name: ${CLOUDINARY_CLOUD_NAME:}
      api-key: ${CLOUDINARY_API_KEY:}
      api-secret: ${CLOUDINARY_API_SECRET:}
      folder: ${CLOUDINARY_FOLDER:serravit}
  security:
    require-startup-validation: ${REQUIRE_STARTUP_VALIDATION:false}
    payment:
      init-rate-limit:
        max-attempts: ${PAYMENT_INIT_RATE_LIMIT_MAX_ATTEMPTS:20}
        window-minutes: ${PAYMENT_INIT_RATE_LIMIT_WINDOW_MINUTES:10}
      confirm-rate-limit:
        max-attempts: ${PAYMENT_CONFIRM_RATE_LIMIT_MAX_ATTEMPTS:25}
        window-minutes: ${PAYMENT_CONFIRM_RATE_LIMIT_WINDOW_MINUTES:10}
    order-lookup-rate-limit:
      max-attempts: ${ORDER_LOOKUP_RATE_LIMIT_MAX_ATTEMPTS:12}
      window-minutes: ${ORDER_LOOKUP_RATE_LIMIT_WINDOW_MINUTES:15}
  payment:
    confirm:
      allow-body-fallback: ${PAYMENT_CONFIRM_ALLOW_BODY_FALLBACK:true}
      fallback-mode: ${PAYMENT_CONFIRM_FALLBACK_MODE:LOG_ONLY}
  shipping:
    auto-deliver-days: ${AUTO_DELIVER_DAYS:10}
    auto-deliver-cron: ${AUTO_DELIVER_CRON:0 0 2 * * *}
    auto-deliver-zone: ${AUTO_DELIVER_ZONE:Europe/Istanbul}

logging:
  level:
    org.apache.kafka: WARN
    org.springframework.kafka: WARN
    com.ecommerce.product: INFO

server:
  port: 8081

spring:
  application:
    name: product-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ecommerce}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: ${KAFKA_SERVER:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    properties:
      spring.json.add.type.headers: false
    jackson:
      serialization:
        write-dates-as-timestamps: false

app:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-key-must-be-at-least-32-chars}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  admin-frontend-url: ${ADMIN_FRONTEND_URL:http://localhost:3001}
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://localhost:3001}
  seed-data: ${SEED_DATA:false}
  mail:
    resend:
      api-key: ${RESEND_API_KEY:}
      from-email: ${RESEND_FROM_EMAIL:}
      reply-to: ${RESEND_REPLY_TO:}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}

logging:
  level:
    org.apache.kafka: WARN
    org.springframework.kafka: WARN
    com.ecommerce.product: INFO
